<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RagaM-Roll</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/icon-192.png" />
  <meta name="theme-color" content="#1a1a1a" />
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background:#1a1a1a; color:#eee; }
    .toolbar { display:flex; gap:.5rem; align-items:center; padding:.5rem; border-bottom:1px solid #333; }
    .toolbar .readout { margin-left:auto; opacity:.7; font-size:.85rem; }
    .transport { display:flex; gap:.4rem; align-items:center; padding:.35rem .5rem; border-bottom:1px solid #333; }
    .transport button { font-size:1rem; padding:.15rem .5rem; cursor:pointer; }
    .transport button:disabled { opacity:.4; cursor:default; }
    .diagnostics { margin:.5rem; padding:.5rem; border:1px solid #a63; border-radius:4px; background:#241a10; color:#eda; font-size:.85rem; }
    .diagnostics ul { margin:.25rem 0 0; padding-left:1.25rem; }
    .reference { border-bottom:1px solid #333; max-height:45vh; overflow:auto; padding:.5rem; }
    .reference-head { display:flex; justify-content:space-between; align-items:center; }
    .reference-body { display:grid; grid-template-columns:2fr 1fr; gap:1rem; }
    .reference h4 { margin:.4rem 0; }
    .reference input[type=search] { width:100%; margin-bottom:.4rem; }
    .ref-list { list-style:none; margin:0; padding:0; font-family:ui-monospace,monospace; font-size:13px; }
    .ref-list li { display:grid; grid-template-columns:9rem 1fr; gap:.3rem 1rem; padding:.15rem 0; border-bottom:1px solid #222; }
    .ref-name { font-weight:bold; }
    .ref-seq { color:#9cf; }
    .ref-map { color:#9c9; grid-column:2; }
    .cols { display:grid; grid-template-columns:1fr 1fr; gap:.5rem; padding:.5rem; }
    .editor, .pane {
      font-family: ui-monospace, "Menlo", "Consolas", monospace;
      font-size: 15px; line-height: 1.2; white-space: pre; overflow:auto;
      background:#111; color:#eee; border:1px solid #333; border-radius:4px;
      padding:.5rem; height: 45vh; margin:0;
    }
    .editor { width:100%; resize:none; }
    .pane.notation { margin:.5rem; height:auto; max-height:35vh; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./app.js"></script>
  <script type="module">
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
  </script>
</body>
</html>
