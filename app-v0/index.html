<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RagaM-Roll</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/icon-192.png" />
  <meta name="theme-color" content="#1a1a1a" />
  <style>
    * { box-sizing: border-box; }
    html, body { height:100%; }
    body { margin: 0; font-family: system-ui, sans-serif; background:#1a1a1a; color:#eee; }
    #app { height:100vh; height:100dvh; display:flex; flex-direction:column; overflow:hidden; }
    .toolbar { display:flex; gap:.5rem; align-items:center; padding:.5rem; border-bottom:1px solid #333; }
    .toolbar .readout { margin-left:auto; opacity:.7; font-size:.85rem; }
    .toolbar .app-badge { font-weight:bold; font-size:.95rem; background:#222; border:1px solid #444;
      border-radius:10px; padding:.12rem .55rem; margin-right:.25rem; }
    .transport { display:flex; flex-wrap:wrap; gap:.4rem; align-items:center; padding:.35rem .5rem; border-bottom:1px solid #333; }
    .transport button { font-size:1rem; padding:.15rem .5rem; cursor:pointer; }
    .transport button:disabled { opacity:.4; cursor:default; }
    .transport .doc-btn { font-size:.85rem; }
    .transport-play { display:flex; gap:.4rem; align-items:center; margin-left:auto; }  /* push playback to the right */
    .transport .vol { display:inline-flex; align-items:center; gap:.3rem; font-size:.8rem;
      margin-left:.5rem; white-space:nowrap; opacity:.9; }
    .transport .vol input[type=range] { width:5rem; cursor:pointer; accent-color:#6c9; }
    .transport .vol .vol-toggle { font:inherit; font-size:.8rem; cursor:pointer; background:#2a2a2a;
      color:#eee; border:1px solid #555; border-radius:4px; padding:.1rem .4rem; }
    .transport .vol .vol-toggle[aria-pressed=true] { border-color:#6c9; color:#9fc; }
    .transport .vol.muted input[type=range] { opacity:.4; accent-color:#777; }
    /* Unified Open ▾ menu */
    .openmenu { position:relative; display:inline-flex; }
    .openmenu-btn { cursor:pointer; }
    .openmenu-pop { position:absolute; top:100%; left:0; margin-top:.25rem; z-index:900;
      background:#1a1a1a; border:1px solid #444; border-radius:6px; min-width:11rem; padding:.25rem;
      display:flex; flex-direction:column; box-shadow:0 8px 30px rgba(0,0,0,.5); }
    .openmenu-item { display:block; width:100%; text-align:left; background:none; border:0; color:#eee;
      padding:.35rem .5rem; border-radius:4px; cursor:pointer; font:inherit; }
    .openmenu-item:hover { background:#2a2a3a; }
    .openmenu-item.current { color:#9cf; }
    .openmenu-sep { opacity:.5; font-size:.72rem; letter-spacing:.05em; text-transform:uppercase; padding:.35rem .5rem .15rem; }
    .diagnostics { margin:.5rem; padding:.5rem; border:1px solid #a63; border-radius:4px; background:#241a10; color:#eda; font-size:.85rem; max-height:20vh; overflow:auto; }
    .diagnostics ul { margin:.25rem 0 0; padding-left:1.25rem; }
    .dialog-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.6);
      display:flex; align-items:flex-start; justify-content:center; padding:4vh 1rem; z-index:1000; }
    .dialog-box { background:#1a1a1a; border:1px solid #444; border-radius:6px;
      width:min(760px,100%); max-height:88vh; display:flex; flex-direction:column;
      box-shadow:0 8px 40px rgba(0,0,0,.6); }
    .dialog-head { display:flex; justify-content:space-between; align-items:center;
      padding:.6rem .8rem; border-bottom:1px solid #333; }
    .dialog-head button { cursor:pointer; background:#333; color:#eee; border:1px solid #555; border-radius:4px; }
    .dialog-body { overflow:auto; padding:.5rem .8rem; }
    /* Sticky control strip: stays put while the raga list scrolls beneath it.
       Negative margins + matching padding let its background cover the
       dialog-body padding so scrolled rows never peek above it. Room here for
       more filter controls later. */
    .ref-controls { position:sticky; top:0; z-index:2; background:#1a1a1a;
      margin:-.5rem -.8rem .35rem; padding:.5rem .8rem .1rem; }
    .dialog-search { width:100%; padding:.35rem .5rem; margin-bottom:.4rem;
      background:#111; color:#eee; border:1px solid #444; border-radius:4px; }
    .dialog-count { opacity:.6; font-size:.8rem; margin-bottom:.3rem; }
    .ref-list { list-style:none; margin:0; padding:0; font-family:ui-monospace,monospace; font-size:13px; }
    .ref-list li { display:grid; grid-template-columns:10rem 1fr; column-gap:.8rem;
      padding:.3rem 0; border-bottom:1px solid #222; align-items:baseline; }
    .ref-cols { display:flex; flex-direction:column; gap:.1rem; overflow-x:auto; }
    .ref-name { font-weight:bold; }
    .ref-seq { color:#9cf; }
    .ref-map { color:#9c9; }
    .ref-int { color:#cc9; }
    /* Scale ⚙ / Drone toggles */
    .toolbar .scale-btn.active { border-color:#6c9; color:#9fc; }
    .toolbar .timbre { display:inline-flex; align-items:center; gap:.25rem; font-size:.9rem; }
    .toolbar .timbre select { background:#222; color:#eee; border:1px solid #444; border-radius:4px;
      padding:.15rem .3rem; font:inherit; cursor:pointer; }
    /* Experimental 53-EDO scale dialog */
    .scale-box { width:min(680px,96vw); }
    .sa-pitch { display:flex; align-items:center; gap:.6rem; flex-wrap:wrap; margin:.1rem 0 .5rem;
      padding-bottom:.5rem; border-bottom:1px solid #333; }
    .sa-pitch label, .mela-row label { font-size:.9rem; }
    .sa-pitch select, .mela-row select { margin-left:.35rem; background:#111; color:#eee; border:1px solid #444;
      border-radius:4px; padding:.2rem .35rem; font:inherit; }
    .sa-pitch .sa-note { font-size:.72rem; opacity:.6; }
    /* Mela picker + a/b table */
    .mela-row { display:flex; align-items:center; gap:.4rem; flex-wrap:wrap; margin:.2rem 0 .6rem; }
    .mela-row .mela-step { cursor:pointer; background:#2a2a2a; color:#eee; border:1px solid #555;
      border-radius:4px; padding:.15rem .45rem; font:inherit; }
    .mela-row .mela-step:disabled { opacity:.35; cursor:default; }
    .mela-row .mela-chakra { font-size:.78rem; opacity:.6; margin-left:.2rem; }
    .mela-table { border-collapse:collapse; width:100%; font-family:ui-monospace,monospace; margin:.2rem 0 .7rem; }
    .mela-table th { text-align:right; font-weight:normal; opacity:.55; font-size:.72rem; padding:.2rem .5rem .2rem 0; }
    .mela-table td { text-align:center; padding:.2rem .3rem; font-size:.85rem; }
    .mela-table .mt-swara td { font-weight:bold; }
    .mela-table .mt-variety td { color:#9fc; }
    .mela-table .mt-edo td, .mela-table .mt-cents td { opacity:.7; font-size:.78rem; }
    .mela-table .fixed-dot { opacity:.4; }
    .mela-table .ab { display:inline-flex; gap:2px; }
    .mela-table .ab-btn { cursor:pointer; background:#1a1a1a; color:#bbb; border:1px solid #444;
      border-radius:3px; width:1.4rem; padding:.1rem 0; font:inherit; font-size:.78rem; }
    .mela-table .ab-btn.on { background:#183028; border-color:#6c9; color:#cfe; }
    .scale-actions { display:flex; gap:.5rem; justify-content:flex-end; padding-top:.3rem; border-top:1px solid #333; }
    .scale-actions button { cursor:pointer; background:#2a2a2a; color:#eee; border:1px solid #555;
      border-radius:4px; padding:.3rem .7rem; }
    .scale-actions button.primary { background:#1c3a30; border-color:#6c9; color:#cfe; }
    .scale-actions button:disabled { opacity:.4; cursor:default; }
    .workspace { flex:1 1 0; min-height:0; display:flex; flex-direction:column; padding:.35rem .5rem; }
    .cols { display:grid; gap:.3rem; align-items:stretch; min-height:0; }  /* flex-basis (topFrac) + columns set inline */
    .editor, .pane {
      font-family: ui-monospace, "Menlo", "Consolas", monospace;
      font-size: 15px; line-height: 1.2; white-space: pre; overflow:auto;
      background:#111; color:#eee; border:1px solid #333; border-radius:4px;
      padding:.5rem; margin:0;
    }
    .cols > .editor, .cols > .pane { height:100%; min-height:0; }
    .editor { width:100%; }
    .pane.notation { margin:.35rem 0 0; min-height:0; }  /* flex share set inline */
    .split-v { width:6px; background:#333; cursor:col-resize; border-radius:3px; touch-action:none; }
    .split-h { height:6px; margin:.15rem .5rem; background:#333; cursor:row-resize; border-radius:3px; touch-action:none; }
    .split-v:hover, .split-h:hover { background:#66c; }
    .pane.roll { white-space:normal; } /* container is a div-of-divs; lines carry pre */
    .roll-line { white-space:pre; }    /* keep ascii columns aligned */
    .roll-line.active { background:#2b4; color:#111; }
    .footer { display:flex; gap:.6rem; align-items:center; padding:.35rem .6rem; border-top:1px solid #333; font-size:.75rem; opacity:.7; }
    .footer .build { margin-left:auto; }  /* build timestamp + version, pushed right */
    .footer .ver { color:#9cf; font-family:ui-monospace,monospace; }
    /* Mobile portrait: keep the toolbar uncrowded — no burger needed once Save/
       Export moved to the transport and Open+Examples merged. Readout drops to
       its own line. The version now lives in the footer, shown at every width. */
    @media (max-width:560px) {
      .toolbar { flex-wrap:wrap; }
      .toolbar .readout { margin-left:0; flex-basis:100%; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./app.js"></script>
  <script type="module">
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
  </script>
</body>
</html>
